<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Gerador estático de protocolo de atendimento." />
  <title>Gerador de Protocolo</title>

  <script src="https://unpkg.com/@phosphor-icons/web" defer></script>
  <link rel="stylesheet" href="./protocolo.css?v=20260512-2" />
</head>

<body>
  <aside class="sidebar" aria-label="Navegação">
    <div class="brand">
      <div class="brand-mark" aria-hidden="true">
        <i class="ph ph-receipt"></i>
      </div>
      <div>
        <strong>Protocolo</strong>
        <span>Gerador estático</span>
      </div>
    </div>

    <div class="chat-list">
      <div class="chat-item active">
        <i class="ph ph-receipt" aria-hidden="true"></i>
        <div class="chat-info">
          <div class="chat-title">Gerador de Protocolo</div>
          <div class="chat-date">Geração local</div>
        </div>
      </div>
    </div>

    <div class="sidebar-footer">
      <button class="sidebar-footer-item" id="theme-toggle" type="button">
        <i class="ph ph-moon" aria-hidden="true"></i>
        <span>Modo escuro</span>
      </button>
    </div>
  </aside>

  <main class="main-content">
    <header class="chat-header">
      <button class="mobile-menu-btn" id="mobile-menu-btn" type="button" aria-label="Abrir menu">
        <i class="ph ph-list" aria-hidden="true"></i>
      </button>

      <div class="assistant-info">
        <div class="assistant-avatar" aria-hidden="true">
          <i class="ph ph-receipt"></i>
        </div>
        <div class="assistant-details">
          <span class="name">Gerador de Protocolo</span>
          <span class="status">Cria o número e prepara a mensagem para o cliente</span>
        </div>
      </div>
    </header>

    <section class="protocol-wrap">
      <div class="protocol-card">
        <h1 class="protocol-title">Novo protocolo</h1>
        <p class="protocol-subtitle">Clique em Gerar para criar um protocolo e preparar a mensagem.</p>

        <form class="protocol-form" id="protocol-form">
          <div class="actions">
            <button id="btn-generate" class="btn-primary" type="submit">
              <i class="ph ph-seal-check" aria-hidden="true"></i>
              <span>Gerar</span>
            </button>

            <button id="btn-clear" class="btn-secondary" type="button">
              <i class="ph ph-eraser" aria-hidden="true"></i>
              <span>Limpar</span>
            </button>
          </div>

          <div id="result" class="result" hidden>
            <div class="result-row">
              <span class="k">Protocolo</span>
              <strong class="v protocol-number" id="proto"></strong>
            </div>

            <div class="result-row">
              <span class="k">Gerado em</span>
              <span class="v" id="generated-at"></span>
            </div>

            <div class="field message-field">
              <label for="msg">Mensagem pronta</label>
              <textarea id="msg" class="input-dark-lite" rows="5" readonly></textarea>
            </div>

            <div class="actions">
              <button id="btn-copy-proto" class="btn-secondary" type="button">
                <i class="ph ph-copy" aria-hidden="true"></i>
                <span>Copiar protocolo</span>
              </button>

              <button id="btn-copy-msg" class="btn-secondary" type="button">
                <i class="ph ph-copy" aria-hidden="true"></i>
                <span>Copiar mensagem</span>
              </button>
            </div>
          </div>

          <div id="feedback" class="feedback" role="status" aria-live="polite" hidden></div>
        </form>
      </div>
    </section>
  </main>

  <script src="./protocolo.js?v=20260512-2" defer></script>
</body>
</html>
